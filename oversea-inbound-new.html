<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>【Demo】库存 · 海外仓入库管理 · 新增入库记录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./ERP UI-skill/ASSETS/design-tokens.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-family); font-size: var(--font-size-regular); line-height: var(--line-height-regular); color: var(--color-text-body); background: var(--color-bg-page); -webkit-font-smoothing: antialiased; }
    button, input, select, textarea { font-family: var(--font-family); }

    .page-shell { display: flex; height: 100vh; overflow: hidden; }
    .erp-sidebar {
      width: var(--layout-nav-rail-width);
      flex-shrink: 0;
      background: var(--color-bg-page);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .nav-rail-logo {
      flex-shrink: 0;
      height: var(--nav-logo-zone-height);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 14px 19px;
    }
    .nav-rail-brand-logo { display: block; max-width: 52px; max-height: 52px; width: auto; height: auto; object-fit: contain; }
    .nav-rail-item {
      margin: 0 var(--nav-rail-item-outer-padding-x);
      padding: var(--nav-rail-item-outer-padding-y) 0;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--color-text-secondary);
    }
    .nav-rail-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--nav-rail-icon-label-gap);
      padding: var(--nav-rail-item-inner-padding);
      border-radius: var(--radius-large);
      transition: background 0.12s, color 0.12s;
    }
    .nav-rail-icon-slot { width: 20px; height: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .nav-rail-icon-img { width: 20px; height: 20px; display: block; object-fit: contain; }
    .nav-rail-label {
      font-size: var(--font-size-nav-rail-label);
      line-height: var(--line-height-nav-rail-label);
      font-weight: var(--font-weight-regular);
      text-align: center;
      max-width: 62px;
    }
    .nav-rail-item:hover:not(.active) .nav-rail-inner { background: var(--color-gray-2); }
    .nav-rail-item.active { color: var(--color-primary); }
    .nav-rail-item.active .nav-rail-inner { background: var(--color-primary-bg); }
    .nav-rail-item.active .nav-rail-label { font-weight: var(--font-weight-semibold); }

    .erp-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; min-width: 0; background: var(--color-bg-container); }
    .erp-chrome {
      height: var(--layout-chrome-header-height);
      flex-shrink: 0;
      background: var(--color-bg-page);
      border-bottom: 1px solid var(--color-border-default);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--spacing-loose);
      gap: var(--spacing-base);
    }
    .tab-strip { display: flex; align-items: flex-end; gap: var(--nav-tab-gap); min-width: 0; flex: 1; overflow-x: auto; }
    .erp-tab {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      height: var(--layout-tab-bar-height);
      padding: 8px 12px;
      border: none;
      border-radius: var(--radius-chrome-tab) var(--radius-chrome-tab) 0 0;
      background: transparent;
      font-size: var(--font-size-regular);
      color: var(--color-text-body);
      cursor: pointer;
      font-family: var(--font-family);
      line-height: 22px;
      transition: background 0.12s, box-shadow 0.12s;
    }
    .erp-tab:hover:not(.active) { background: var(--color-chrome-tab-hover-bg); }
    .erp-tab.active { background: var(--color-bg-container); box-shadow: var(--shadow-tab-lift); }
    .erp-tab-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      padding: 0;
      border: none;
      background: none;
      color: inherit;
      cursor: pointer;
      border-radius: 2px;
    }
    .erp-tab-close:hover { background: var(--color-gray-2); }
    .erp-chrome-right {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: var(--nav-chrome-cluster-gap);
    }
    .chrome-icon-btn {
      width: var(--nav-chrome-icon-size);
      height: var(--nav-chrome-icon-size);
      padding: 0;
      border: none;
      background: none;
      color: var(--color-text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-small);
    }
    .chrome-icon-btn:hover { background: var(--color-gray-2); color: var(--color-text-body); }
    .chrome-locale {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0;
      border: none;
      background: none;
      font-size: var(--font-size-regular);
      line-height: 22px;
      color: var(--color-text-body);
      cursor: pointer;
      font-family: var(--font-family);
    }
    .chrome-time { font-size: var(--font-size-regular); line-height: 22px; color: var(--color-text-body); font-variant-numeric: tabular-nums; white-space: nowrap; }
    .chrome-user {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0;
      border: none;
      background: none;
      cursor: pointer;
      font-family: var(--font-family);
    }
    .chrome-avatar {
      width: var(--nav-user-avatar-size);
      height: var(--nav-user-avatar-size);
      border-radius: var(--nav-user-avatar-radius);
      background: var(--color-brand-2);
      color: var(--color-primary);
      font-size: 10px;
      font-weight: var(--font-weight-semibold);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chrome-user-name {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: var(--font-size-regular);
      line-height: 22px;
      color: var(--color-text-body);
    }

    .list-content { flex: 1; padding: var(--spacing-loose); overflow-y: auto; }
    .breadcrumb {
      font-size: var(--font-size-small);
      color: var(--color-text-secondary);
      margin-bottom: var(--spacing-base);
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
    }
    .breadcrumb a { color: var(--color-text-secondary); text-decoration: none; }
    .breadcrumb a:hover { color: var(--color-primary); }
    .breadcrumb-sep { color: var(--color-text-disabled); user-select: none; }
    .page-title-row { display: flex; align-items: center; justify-content: space-between; gap: var(--spacing-base); margin-bottom: var(--spacing-base); flex-wrap: wrap; }
    .page-title { font-size: var(--font-size-h5); font-weight: var(--font-weight-semibold); color: var(--color-text-heading-2); }
    .list-toolbar { display: flex; align-items: center; gap: var(--spacing-base-tight); flex-wrap: wrap; }
    .list-bg { background: var(--color-white); border-radius: var(--radius-medium); box-shadow: var(--shadow-1); overflow: hidden; }
    .list-head { display: flex; padding: 10px var(--spacing-base); background: var(--color-gray-1); border-bottom: 1px solid var(--color-border-default); font-size: var(--font-size-small); font-weight: var(--font-weight-semibold); color: var(--color-text-secondary); }
    .col { flex: 1; padding: 0 var(--spacing-tight); }
    .col-sm { flex: 0 0 72px; padding: 0 var(--spacing-tight); }
    .col-lg { flex: 1.4; padding: 0 var(--spacing-tight); }
    .list-row { display: flex; padding: 12px var(--spacing-base); border-bottom: 1px solid var(--color-border-default); font-size: var(--font-size-regular); color: var(--color-text-body); }
    .list-row:hover { background: var(--color-gray-1); }
    .list-row:last-child { border-bottom: none; }

    .drawer-mask { position: fixed; inset: 0; background: rgba(19,23,31,0.45); z-index: 100; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
    .drawer-mask.visible { opacity: 1; pointer-events: auto; }
    .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: max-content; max-width: var(--drawer-width-max); background: var(--color-white); box-shadow: var(--shadow-3); z-index: 101; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); }
    .drawer.open { transform: translateX(0); }
    .drawer-header { flex-shrink: 0; height: 56px; border-bottom: 1px solid var(--color-border-default); display: flex; align-items: center; gap: var(--spacing-base); padding: 0 var(--spacing-loose); }
    .drawer-close { width: 20px; height: 20px; border: none; background: none; color: var(--color-text-body); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .drawer-close:hover { color: var(--color-text-heading-1); }
    .drawer-title { font-size: var(--font-size-h6); font-weight: var(--font-weight-semibold); color: var(--color-text-heading-2); }
    .drawer-body { flex: 1; min-height: 0; overflow-y: auto; padding: var(--spacing-loose); display: flex; flex-direction: column; gap: 0; }
    .drawer-footer { flex-shrink: 0; background: var(--color-white); border-top: 1px solid var(--color-border-default); padding: 12px var(--spacing-loose); display: flex; justify-content: flex-end; align-items: center; gap: var(--spacing-base-tight); }

    /* form-standard §2.4：一级分割线 + 一级标题行（2×16 装饰条 + 16 Semibold 标题，间距 12） */
    .form-l1-divider {
      border: none;
      border-top: 1px solid var(--color-border-default);
      margin: var(--spacing-loose) 0 0;
      padding: 0;
      height: 0;
      background: transparent;
    }
    .form-l1-title-row {
      display: flex;
      align-items: center;
      gap: var(--spacing-base-tight);
      margin-bottom: var(--spacing-base-tight);
    }
    .form-l1-bar {
      width: 2px;
      height: 16px;
      background: var(--color-primary);
      flex-shrink: 0;
      border-radius: 1px;
    }
    .form-l1-title-text {
      font-size: var(--font-size-h6);
      font-weight: var(--font-weight-semibold);
      line-height: var(--line-height-h6);
      color: var(--color-gray-11);
    }
    .form-field { display: flex; flex-direction: column; gap: var(--spacing-base-tight); }
    .form-row { display: flex; flex-wrap: wrap; gap: var(--spacing-loose) var(--spacing-base-loose); align-items: flex-start; }
    .form-label { font-size: var(--font-size-regular); color: var(--color-text-body); display: flex; align-items: center; gap: 2px; }
    .req { color: var(--color-error); }
    .form-control {
      display: block;
      height: var(--control-height-md);
      padding: 0 var(--spacing-base);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-small);
      font-size: var(--font-size-regular);
      color: var(--color-text-body);
      background: var(--color-bg-container);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-control:focus { border-color: var(--color-primary-focus); box-shadow: 0 0 0 2px rgba(52,107,250,0.12); }
    .form-control:disabled, .form-control.is-readonly {
      background: var(--color-bg-disabled);
      color: var(--color-text-secondary);
      cursor: default;
    }
    textarea.form-control { height: auto; min-height: 80px; padding: var(--spacing-tight) var(--spacing-base); resize: vertical; line-height: var(--line-height-regular); }
    .w-medium { width: var(--input-width-medium); }
    .w-long { width: var(--input-width-long); }
    .w-sku { width: 400px; max-width: 100%; }
    .w-number { width: var(--input-width-number); }

    .info-hint {
      display: flex;
      align-items: flex-start;
      gap: var(--spacing-extra-tight);
      padding: var(--spacing-tight) var(--spacing-base);
      background: var(--color-primary-bg);
      border-radius: var(--radius-small);
      color: var(--color-primary);
      font-size: var(--font-size-small);
      line-height: var(--line-height-small);
      margin-bottom: var(--spacing-loose);
    }

    .cs-wrap { position: relative; display: inline-block; }
    .cs-wrap.is-disabled .cs-trigger {
      pointer-events: none;
      background: var(--color-bg-disabled);
      color: var(--color-text-disabled);
      border-color: var(--color-border-default);
    }
    .cs-wrap.is-disabled .cs-arrow { opacity: 0.45; }
    .cs-trigger {
      height: var(--control-height-md);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-small);
      display: flex;
      align-items: center;
      padding: 0 var(--spacing-base);
      cursor: pointer;
      background: var(--color-white);
      transition: border-color 0.15s, box-shadow 0.15s;
      user-select: none;
    }
    .cs-trigger:hover { border-color: var(--color-primary-focus); }
    .cs-trigger.open { border-color: var(--color-primary-focus); box-shadow: 0 0 0 2px rgba(52,107,250,0.12); }
    .cs-value { flex: 1; font-size: var(--font-size-regular); color: var(--color-text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cs-value.selected { color: var(--color-text-body); }
    .cs-clear { display: none; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; color: var(--color-text-secondary); margin-right: 2px; flex-shrink: 0; cursor: pointer; }
    .cs-clear:hover { background: var(--color-gray-3); color: var(--color-text-body); }
    .cs-wrap:hover .cs-clear.show { display: flex; }
    .cs-wrap:hover .cs-clear.show ~ .cs-arrow { display: none; }
    .cs-arrow { flex-shrink: 0; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; color: var(--color-text-secondary); transition: transform 0.15s; }
    .cs-trigger.open .cs-arrow { transform: rotate(180deg); }
    .cs-panel {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      min-width: 100%;
      background: var(--color-white);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-medium);
      box-shadow: var(--shadow-3);
      z-index: 999;
      display: none;
      flex-direction: column;
      padding: 6px;
      max-height: 350px;
    }
    .cs-panel.open { display: flex; }
    .cs-search-wrap { position: relative; flex-shrink: 0; margin-bottom: 6px; }
    .cs-search {
      width: 100%;
      height: var(--control-height-md);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-small);
      padding: 0 32px 0 var(--spacing-tight);
      font-size: var(--font-size-regular);
      font-family: var(--font-family);
      color: var(--color-text-body);
      background: var(--color-bg-container);
      outline: none;
    }
    .cs-search:focus { border-color: var(--color-primary-focus); }
    .cs-search::placeholder { color: var(--color-text-secondary); }
    .cs-search-icon { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: var(--color-text-secondary); pointer-events: none; }
    .cs-list { overflow-y: auto; flex: 1; }
    .cs-item {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 var(--spacing-tight);
      border-radius: var(--radius-small);
      cursor: pointer;
      transition: background 0.1s;
      min-height: var(--control-height-md);
    }
    .cs-item:hover { background: var(--color-gray-1); }
    .cs-item.selected { background: var(--color-primary-bg); }
    .cs-item.selected .cs-item-main { color: var(--color-primary); }
    .cs-item--double { min-height: 50px; padding: 5px var(--spacing-tight); }
    .cs-item-main { font-size: var(--font-size-regular); color: var(--color-text-body); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cs-item-sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cs-empty { padding: var(--spacing-base); text-align: center; font-size: var(--font-size-small); color: var(--color-text-secondary); }
    .cs-group-head {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 var(--spacing-tight);
      height: var(--control-height-md);
      cursor: pointer;
      border-radius: var(--radius-small);
      font-size: var(--font-size-regular);
      color: var(--color-text-body);
      transition: background 0.1s;
    }
    .cs-group-head:hover { background: var(--color-gray-1); }
    .cs-group-icon { flex-shrink: 0; color: var(--color-text-secondary); transition: transform 0.15s; }
    .cs-group-icon.collapsed { transform: rotate(-90deg); }
    .cs-group-children.hidden { display: none; }
    .cs-item--child { padding-left: 28px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-super-tight);
      height: var(--control-height-md);
      padding: 0 var(--spacing-base);
      border-radius: var(--radius-small);
      font-size: var(--font-size-regular);
      border: 1px solid transparent;
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-primary { background: var(--color-primary); color: var(--color-text-inverse); border-color: var(--color-primary); }
    .btn-primary:hover { background: var(--color-primary-hover); border-color: var(--color-primary-hover); }
    .btn-default { background: var(--color-white); color: var(--color-text-body); border-color: var(--color-border-default); }
    .btn-default:hover { border-color: var(--color-primary); color: var(--color-primary); }
  </style>
</head>

<div class="page-shell">

  <div class="erp-main">

  function pad(n) {
    return String(n).padStart(2, '0');
  }

  function genInboundNo() {
    var d = new Date();
    var ymd = d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate());
    var rnd = String(Math.floor(10000 + Math.random() * 90000));
    return 'IN-' + ymd + '-' + rnd;
  }

  function refreshAutoDocNo() {
    var el = document.getElementById('autoDocNo');
    if (!el) return;
    if (shipCtrl && shipCtrl.getValue() && whCtrl && whCtrl.getValue() && skuCtrl && skuCtrl.getValue()) {
      el.value = genInboundNo();
    } else {
      el.value = '—';
    }
  }

  function setCascadeDisabledAfterSku(disabled) {
    document.getElementById('recvQty').disabled = disabled;
    document.getElementById('inboundDate').disabled = disabled;
    if (channelCtrl && channelCtrl.setDisabled) channelCtrl.setDisabled(disabled);
    if (typeCtrl && typeCtrl.setDisabled) typeCtrl.setDisabled(disabled);
  }

  function onShipmentChange() {
    selectedShipment = SHIPMENT_TREE.find(function (s) {
      return s.no === shipCtrl.getValue();
    }) || null;
    selectedWhName = null;
    whCtrl.clear();
    skuCtrl.clear();
    if (typeCtrl) typeCtrl.clear();
    if (channelCtrl) channelCtrl.clear();

    if (!selectedShipment) {
      whCtrl.updateItems([]);
      skuCtrl.updateItems([]);
      whWrap.classList.add('is-disabled');
      skuWrap.classList.add('is-disabled');
      setCascadeDisabledAfterSku(true);
      document.getElementById('recvQty').value = '';
      refreshAutoDocNo();
      return;
    }

    whCtrl.updateItems(
      selectedShipment.warehouses.map(function (w) {
        return { value: w.name, label: w.name, sub: w.code + ' · 海外仓' };
      })
    );
    whWrap.classList.remove('is-disabled');
    skuWrap.classList.add('is-disabled');
    skuCtrl.updateItems([]);
    setCascadeDisabledAfterSku(true);
    document.getElementById('recvQty').value = '';
    refreshAutoDocNo();
  }

  function onWarehouseChange() {
    selectedWhName = whCtrl.getValue();
    skuCtrl.clear();
    if (typeCtrl) typeCtrl.clear();
    if (channelCtrl) channelCtrl.clear();

    if (!selectedShipment || !selectedWhName) {
      skuCtrl.updateItems([]);
      skuWrap.classList.add('is-disabled');
      setCascadeDisabledAfterSku(true);
      document.getElementById('recvQty').value = '';
      refreshAutoDocNo();
      return;
    }

    var wh = selectedShipment.warehouses.find(function (w) {
      return w.name === selectedWhName;
    });
    if (!wh) {
      skuCtrl.updateItems([]);
      skuWrap.classList.add('is-disabled');
      setCascadeDisabledAfterSku(true);
      refreshAutoDocNo();
      return;
    }

    skuCtrl.updateItems(
      wh.skus.map(function (s) {
        return { value: s.code, label: s.code, sub: s.sub };
      })
    );
    skuWrap.classList.remove('is-disabled');
    setCascadeDisabledAfterSku(true);
    document.getElementById('recvQty').value = '';
    refreshAutoDocNo();
  }

  function onSkuChange() {
    var ok = !!(skuCtrl && skuCtrl.getValue());
    setCascadeDisabledAfterSku(!ok);
    if (ok) {
      var d = new Date();
      document.getElementById('inboundDate').value =
        d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
    } else {
      document.getElementById('inboundDate').value = '';
      document.getElementById('recvQty').value = '';
      if (channelCtrl) channelCtrl.clear();
      if (typeCtrl) typeCtrl.clear();
    }
    refreshAutoDocNo();
  }

  var whWrap;
  var skuWrap;

  function createSearchSelect(opts) {
    var selected = null;
    var items = opts.items || [];
    var id = 'cs_' + Math.random().toString(36).slice(2);
    var wrap = document.createElement('div');
    wrap.className = 'cs-wrap';
    wrap.style.width = opts.width + 'px';

    wrap.innerHTML =
      '<div class="cs-trigger" id="' +
      id +
      '_trigger">' +
      '<span class="cs-value" id="' +
      id +
      '_value">' +
      opts.placeholder +
      '</span>' +
      '<span class="cs-clear" id="' +
      id +
      '_clear"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 2l6 6M8 2L2 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></span>' +
      '<span class="cs-arrow"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>' +
      '</div>' +
      '<div class="cs-panel" id="' +
      id +
      '_panel">' +
      '<div class="cs-search-wrap">' +
      '<input class="cs-search" id="' +
      id +
      '_search" placeholder="' +
      (opts.searchPlaceholder || '搜索...') +
      '" />' +
      '<span class="cs-search-icon"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M9.5 9.5l2.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></span>' +
      '</div>' +
      '<div class="cs-list" id="' +
      id +
      '_list"></div>' +
      '</div>';

    opts.mount.appendChild(wrap);

    var trigger = wrap.querySelector('#' + id + '_trigger');
    var panel = wrap.querySelector('#' + id + '_panel');
    var valEl = wrap.querySelector('#' + id + '_value');
    var clearEl = wrap.querySelector('#' + id + '_clear');
    var search = wrap.querySelector('#' + id + '_search');
    var list = wrap.querySelector('#' + id + '_list');

    function renderList(filter) {
      var q = (filter || '').toLowerCase();
      var filtered = items.filter(function (i) {
        return (
          !q ||
          String(i.label)
            .toLowerCase()
            .includes(q) ||
          String(i.sub || '')
            .toLowerCase()
            .includes(q) ||
          String(i.value || '')
            .toLowerCase()
            .includes(q)
        );
      });
      if (!filtered.length) {
        list.innerHTML = '<div class="cs-empty">暂无匹配结果</div>';
        return;
      }
      list.innerHTML = filtered
        .map(function (i) {
          return (
            '<div class="cs-item ' +
            (opts.doubleRow ? 'cs-item--double' : '') +
            ' ' +
            (selected === i.value ? 'selected' : '') +
            '" data-value="' +
            i.value +
            '">' +
            '<div class="cs-item-main">' +
            i.label +
            '</div>' +
            (i.sub ? '<div class="cs-item-sub">' + i.sub + '</div>' : '') +
            '</div>'
          );
        })
        .join('');
      list.querySelectorAll('.cs-item').forEach(function (el) {
        el.addEventListener('click', function () {
          var val = el.dataset.value;
          selected = val;
          var item = items.find(function (x) {
            return String(x.value) === String(val);
          });
          valEl.textContent = item ? item.label : val;
          valEl.classList.add('selected');
          clearEl.classList.add('show');
          close();
          if (opts.onSelect) opts.onSelect(val, item);
        });
      });
    }

    function open() {
      if (wrap.classList.contains('is-disabled')) return;
      panel.classList.add('open');
      trigger.classList.add('open');
      renderList('');
      setTimeout(function () {
        search.focus();
      }, 50);
    }
    function close() {
      panel.classList.remove('open');
      trigger.classList.remove('open');
      search.value = '';
    }

    trigger.addEventListener('click', function (e) {
      if (e.target === clearEl || clearEl.contains(e.target)) return;
      panel.classList.contains('open') ? close() : open();
    });
    clearEl.addEventListener('click', function (e) {
      e.stopPropagation();
      selected = null;
      valEl.textContent = opts.placeholder;
      valEl.classList.remove('selected');
      clearEl.classList.remove('show');
      if (opts.onClear) opts.onClear();
    });
    search.addEventListener('input', function () {
      renderList(search.value);
    });
    document.addEventListener('click', function (e) {
      if (!wrap.contains(e.target)) close();
    });

    return {
      getValue: function () {
        return selected;
      },
      clear: function () {
        clearEl.click();
      },
      updateItems: function (newItems) {
        items.length = 0;
        items.push.apply(items, newItems);
        if (panel.classList.contains('open')) renderList(search.value);
      },
      setDisabled: function (dis) {
        wrap.classList.toggle('is-disabled', !!dis);
        if (dis) close();
      },
    };
  }

  function createChannelCascader(opts) {
    var selected = null;
    var id = 'cc_' + Math.random().toString(36).slice(2);
    var wrap = document.createElement('div');
    wrap.className = 'cs-wrap';
    wrap.style.width = opts.width + 'px';

    wrap.innerHTML =
      '<div class="cs-trigger" id="' +
      id +
      '_trigger">' +
      '<span class="cs-value" id="' +
      id +
      '_value">' +
      opts.placeholder +
      '</span>' +
      '<span class="cs-clear" id="' +
      id +
      '_clear"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 2l6 6M8 2L2 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></span>' +
      '<span class="cs-arrow"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>' +
      '</div>' +
      '<div class="cs-panel" id="' +
      id +
      '_panel">' +
      '<div class="cs-search-wrap">' +
      '<input class="cs-search" id="' +
      id +
      '_search" placeholder="' +
      (opts.searchPlaceholder || '支持搜索：地区、渠道') +
      '" />' +
      '<span class="cs-search-icon"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M9.5 9.5l2.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></span>' +
      '</div>' +
      '<div class="cs-list" id="' +
      id +
      '_list"></div>' +
      '</div>';

    opts.mount.appendChild(wrap);

    var trigger = wrap.querySelector('#' + id + '_trigger');
    var panel = wrap.querySelector('#' + id + '_panel');
    var valEl = wrap.querySelector('#' + id + '_value');
    var clearEl = wrap.querySelector('#' + id + '_clear');
    var search = wrap.querySelector('#' + id + '_search');
    var list = wrap.querySelector('#' + id + '_list');
    var groups = opts.groups;
    var expandState = {};
    groups.forEach(function (g) {
      expandState[g.label] = true;
    });

    function renderCascader(q) {
      q = (q || '').toLowerCase();
      list.innerHTML = '';
      groups.forEach(function (g) {
        var children = g.children.filter(function (c) {
          return !q || c.toLowerCase().includes(q);
        });
        var groupMatch = !q || g.label.toLowerCase().includes(q);
        if (q && !groupMatch && !children.length) return;

        var groupDiv = document.createElement('div');
        var head = document.createElement('div');
        head.className = 'cs-group-head';
        var expanded = expandState[g.label];
        head.innerHTML =
          '<span class="cs-group-icon ' +
          (expanded ? '' : 'collapsed') +
          '"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>' +
          '<span>' +
          g.label +
          '</span>';
        head.addEventListener('click', function () {
          expandState[g.label] = !expandState[g.label];
          renderCascader(search.value);
        });
        groupDiv.appendChild(head);

        var childWrap = document.createElement('div');
        childWrap.className = 'cs-group-children' + (expanded ? '' : ' hidden');
        children.forEach(function (c) {
          var item = document.createElement('div');
          item.className = 'cs-item cs-item--child' + (selected === c ? ' selected' : '');
          item.innerHTML = '<div class="cs-item-main">' + c + '</div>';
          item.addEventListener('click', function () {
            selected = c;
            valEl.textContent = c;
            valEl.classList.add('selected');
            clearEl.classList.add('show');
            close();
            if (opts.onSelect) opts.onSelect(c);
          });
          childWrap.appendChild(item);
        });
        groupDiv.appendChild(childWrap);
        list.appendChild(groupDiv);
      });
    }

    function open() {
      if (wrap.classList.contains('is-disabled')) return;
      panel.classList.add('open');
      trigger.classList.add('open');
      renderCascader('');
      setTimeout(function () {
        search.focus();
      }, 50);
    }
    function close() {
      panel.classList.remove('open');
      trigger.classList.remove('open');
      search.value = '';
    }

    trigger.addEventListener('click', function (e) {
      if (clearEl.contains(e.target)) return;
      panel.classList.contains('open') ? close() : open();
    });
    clearEl.addEventListener('click', function (e) {
      e.stopPropagation();
      selected = null;
      valEl.textContent = opts.placeholder;
      valEl.classList.remove('selected');
      clearEl.classList.remove('show');
      if (opts.onClear) opts.onClear();
    });
    search.addEventListener('input', function () {
      renderCascader(search.value.toLowerCase());
    });
    document.addEventListener('click', function (e) {
      if (!wrap.contains(e.target)) close();
    });

    return {
      getValue: function () {
        return selected;
      },
      clear: function () {
        clearEl.click();
      },
      setDisabled: function (dis) {
        wrap.classList.toggle('is-disabled', !!dis);
        if (dis) close();
      },
    };
  }

  window.openDrawer = function () {
    document.getElementById('drawer').classList.add('open');

  window.handleSubmit = function () {
    if (!shipCtrl.getValue()) {
      alert('请选择关联发货单号');
      return;

    if (!whCtrl.getValue()) {
      alert('请选择入库仓库');
      return;

    if (!skuCtrl.getValue()) {
      alert('请选择 SKU');
      return;
    }
    var qty = parseInt(document.getElementById('recvQty').value, 10);
    if (!qty || qty < 1) {
      alert('请填写接收数量（≥ 1）');
      return;
    }
    if (!channelCtrl.getValue()) {
      alert('请选择入库渠道');
      return;
    }
    if (!typeCtrl.getValue()) {
      alert('请选择入库类型');
      return;
    }
    if (!document.getElementById('inboundDate').value) {
      alert('请选择入库日期');
      return;
    }
    alert('入库记录已保存：' + document.getElementById('autoDocNo').value);
    closeDrawer();
  };

  window.handleSaveNext = function () {
    alert('演示：保存当前并继续新增下一条');
  };

  window.addEventListener('DOMContentLoaded', function () {
    if (typeof mountErpNavRailFromFigma === 'function') mountErpNavRailFromFigma();

    shipCtrl = createSearchSelect({
      mount: document.getElementById('shipMount'),
      width: 400,
      placeholder: '请选择关联发货单号',
      searchPlaceholder: '支持搜索：发货单号、目的区域、箱数',
      items: SHIPMENT_TREE.map(function (s) {
        return { value: s.no, label: s.no, sub: s.sub };
      }),
      doubleRow: true,
      onSelect: function () {
        onShipmentChange();
      },
      onClear: function () {
        onShipmentChange();
      },
    });

    whCtrl = createSearchSelect({
      mount: document.getElementById('whMount'),
      width: 240,
      placeholder: '请选择入库仓库',
      searchPlaceholder: '支持搜索：仓库名称、编码',
      items: [],
      doubleRow: true,
      onSelect: function () {
        onWarehouseChange();
      },
      onClear: function () {
        onWarehouseChange();
      },
    });
    whWrap = document.getElementById('whMount').querySelector('.cs-wrap');

    whWrap.classList.add('is-disabled');
    skuCtrl = createSearchSelect({
      mount: document.getElementById('skuMount'),
      width: 400,
      placeholder: '请选择对应SKU',
      searchPlaceholder: '支持搜索：SKU编码、地区、品类、物料编码',
      items: [],
      doubleRow: true,
      onSelect: function () {
        onSkuChange();
      },
      onClear: function () {
        onSkuChange();
      },
    });
    skuWrap = document.getElementById('skuMount').querySelector('.cs-wrap');
    skuWrap.classList.add('is-disabled');

    channelCtrl = createChannelCascader({
      mount: document.getElementById('channelMount'),
      width: 240,
      placeholder: '请选择对应渠道',
      searchPlaceholder: '支持搜索：地区、渠道',
      groups: CHANNEL_GROUPS,
    });

    typeCtrl = createSearchSelect({
      mount: document.getElementById('typeMount'),
      width: 240,
      placeholder: '请选择入库类型',
      searchPlaceholder: '支持搜索：入库类型',
      items: INBOUND_TYPES.map(function (t) {
        return { value: t.value, label: t.label, sub: t.sub };
      }),
      doubleRow: true,
    });

    channelCtrl.setDisabled(true);
    typeCtrl.setDisabled(true);
    document.getElementById('recvQty').disabled = true;
    document.getElementById('inboundDate').disabled = true;

    openDrawer();

    function tickChromeTime() {
      var el = document.getElementById('chromeTime');
      if (!el) return;
      var d = new Date();
      el.textContent =
        d.getFullYear() +
        '/' +
        pad(d.getMonth() + 1) +
        '/' +
        pad(d.getDate()) +
        ' ' +
        pad(d.getHours()) +
        ':' +
        pad(d.getMinutes()) +
        ':' +
        pad(d.getSeconds());
    }
    tickChromeTime();
    setInterval(tickChromeTime, 1000);
  });
})();
</script>
</body>
</html>
