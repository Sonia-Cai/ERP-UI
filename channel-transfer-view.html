    .nav-rail-item {

      background: transparent;
      cursor: pointer;
      color: var(--color-text-secondary);

    .nav-rail-icon-img { width: 20px; height: 20px; display: block; object-fit: contain; }
    .nav-rail-label {

    .erp-chrome {

      flex-shrink: 0;
      background: var(--color-bg-page);

      justify-content: space-between;
      padding: 0 var(--spacing-loose);

    .drawer {

    .drawer-body {

      min-height: 0;

    /* view-form-standard.md §2：只读 KV — 上标题、下详情、左对齐；标题→详情 12px；相邻字段块 24px */
    .kv-stack { display: flex; flex-direction: column; gap: var(--spacing-loose); }
    .kv-field {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: var(--spacing-base-tight);
      font-size: var(--font-size-regular);
      line-height: var(--line-height-regular);
      text-align: left;
    }
    .kv-label {
      align-self: flex-start;
      color: var(--color-gray-7);
      font-weight: var(--font-weight-regular);
    }
    .kv-value {
      align-self: flex-start;
      width: 100%;
      max-width: 100%;
      color: var(--color-text-body);
      word-break: break-word;
      text-align: left;
    }
    .kv-value.muted { color: var(--color-text-secondary); }
    /* 双列一行：两格各为「上标题、下详情」，列间距 24px */
    .kv-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: var(--spacing-loose);
      align-items: start;
    }
    .kv-pair > .kv-field { min-width: 0; }
    .status-pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 10px;
      border-radius: var(--radius-tag);
      font-size: var(--font-size-small);
      font-weight: var(--font-weight-semibold);
      white-space: nowrap;
    }
    .status-pill.pending { background: var(--color-warning-bg); color: var(--color-warning); }
    .status-pill.done { background: var(--color-success-bg); color: var(--color-success); }
    .drawer-footer {
      flex-shrink: 0;
      height: 56px;
      border-top: 1px solid var(--color-border-default);
      padding: 0 var(--spacing-loose);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: var(--spacing-base-tight);
      background: var(--color-white);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-super-tight);
      height: var(--control-height-md);
      padding: 0 var(--spacing-base);
      border-radius: var(--radius-small);
      font-size: var(--font-size-regular);
      border: 1px solid transparent;
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      font-family: var(--font-family);

    .btn-primary { background: var(--color-primary); color: var(--color-text-inverse); border-color: var(--color-primary); }
    .btn-primary:hover { background: var(--color-primary-hover); border-color: var(--color-primary-hover); }
    .btn-default { background: var(--color-white); color: var(--color-text-body); border-color: var(--color-border-default); }
    .btn-default:hover { border-color: var(--color-primary); color: var(--color-primary); }
  </style>

<script>
/**
 * 字段顺序：SKU → From / To → 仓库名称 / 仓库编码 → 调拨数量 / 单据状态 → 审批人 → 备注
 * 版式：view-form-standard.md §2 只读 KV（上标题、下详情、左对齐；标题→详情 12px；块间 24px）
 */
const VIEW_RECORDS = [
  {
    sku: '10-11001-1110',
    fromChannel: 'AMZ-S',
    toChannel: 'Temu-线上-B2C',
    warehouseName: 'DE仓',
    warehouseCode: 'WH-DE-001',
    qty: '120',
    statusText: '待审批',
    statusClass: 'pending',
    approver: '周某某',
    remark: '旺季补货，请优先审批。若库存不足请同步运营侧。',
  },
  {
    sku: '10-01008-102',
    fromChannel: 'TK-S',
    toChannel: 'AMZ-S',
    warehouseName: 'TE_CO2仓',
    warehouseCode: 'WH-US-002',
    qty: '48',
    statusText: '已通过',
    statusClass: 'done',
    approver: 'Lisa 某',
    remark: '—',
  },
  {
    sku: '10-PH100-AU',
    fromChannel: 'AMZ-S',
    toChannel: 'TK-S',
    warehouseName: 'SYD仓',
    warehouseCode: 'WH-AU-001',
    qty: '200',
    statusText: '已通过',
    statusClass: 'done',
    approver: 'David 某',
    remark: '澳洲区域调拨，已线下确认收货窗口。',
  },
];

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function kvSingle(label, innerHtml, muted) {
  return (
    '<div class="kv-field" role="group">' +
    '<div class="kv-label">' +
    escapeHtml(label) +
    '</div>' +
    '<div class="kv-value' +
    (muted ? ' muted' : '') +
    '">' +
    innerHtml +
    '</div></div>'
  );
}

function kvPair(label1, inner1, muted1, label2, inner2, muted2) {
  const c1 = muted1 ? 'kv-value muted' : 'kv-value';
  const c2 = muted2 ? 'kv-value muted' : 'kv-value';
  return (
    '<div class="kv-pair" role="group">' +
    '<div class="kv-field"><div class="kv-label">' +
    escapeHtml(label1) +
    '</div><div class="' +
    c1 +
    '">' +
    inner1 +
    '</div></div>' +
    '<div class="kv-field"><div class="kv-label">' +
    escapeHtml(label2) +
    '</div><div class="' +
    c2 +
    '">' +
    inner2 +
    '</div></div>' +
    '</div>'
  );
}

/** SKU 独占一行；From/To、仓库名/编码、数量/状态 各双列一行；审批人、备注各占一行 */
function renderKv(rec) {
  const statusHtml =
    '<span class="status-pill ' + rec.statusClass + '">' + escapeHtml(rec.statusText) + '</span>';
  const remarkMuted = rec.remark === '—';
  const remarkInner = remarkMuted ? '—' : escapeHtml(rec.remark);
  document.getElementById('kvMount').innerHTML = [
    kvSingle('SKU', escapeHtml(rec.sku), false),
    kvPair('From 渠道', escapeHtml(rec.fromChannel), false, 'To 渠道', escapeHtml(rec.toChannel), false),
    kvPair(
      '仓库名称',
      escapeHtml(rec.warehouseName),
      false,
      '仓库编码',
      escapeHtml(rec.warehouseCode),
      false
    ),
    kvPair('调拨数量', escapeHtml(rec.qty), false, '单据状态', statusHtml, false),
    kvSingle('审批人', escapeHtml(rec.approver), false),
    kvSingle('备注', remarkInner, remarkMuted),
  ].join('');
}

function openView(idx) {
  const rec = VIEW_RECORDS[idx];
  if (!rec) return;
  renderKv(rec);
  document.getElementById('drawerMask').classList.add('visible');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawerMask').classList.remove('visible');
  document.getElementById('drawer').classList.remove('open');
}

window.addEventListener('DOMContentLoaded', () => {
  if (typeof mountErpNavRailFromFigma === 'function') mountErpNavRailFromFigma();
  function tickChromeTime() {
    var el = document.getElementById('chromeTime');
    if (!el) return;
    var d = new Date();
    function p(n) { return String(n).padStart(2, '0'); }
    el.textContent = d.getFullYear() + '/' + p(d.getMonth() + 1) + '/' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
  }
  tickChromeTime();
  setInterval(tickChromeTime, 1000);
});
</script>
